<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Festa d’Estate - Rotary Club Chiari</title>

<style>
body {
  margin:0;
  font-family: Arial, sans-serif;
  background:#f7f4fb;
}

.container {
  max-width:700px;
  margin:40px auto;
  background:#fff;
  padding:30px;
  border-radius:20px;
  box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

h1 {
  text-align:center;
  color:#c0188f;
}

label {
  display:block;
  margin-top:15px;
  font-weight:bold;
}

input, select, textarea {
  width:100%;
  padding:12px;
  margin-top:5px;
  border-radius:10px;
  border:1px solid #ccc;
}

button {
  width:100%;
  margin-top:20px;
  padding:15px;
  background:#c0188f;
  color:#fff;
  border:none;
  border-radius:10px;
  font-size:16px;
  cursor:pointer;
}

.success {
  display:none;
  margin-top:15px;
  padding:10px;
  background:#eaf7ec;
  color:green;
  border-radius:10px;
}
</style>
</head>

<body>

<div class="container">
<h1>Registrazione evento</h1>

<iframe name="hidden_iframe" style="display:none;"></iframe>

<form id="form"
action="https://docs.google.com/forms/d/e/1FAIpQLSeLeAOPprrmzX6BkEd6YiCXZ3d05xISg0DlAAW7CFw-f01e4A/formResponse"
method="POST"
target="hidden_iframe">

<label>Nome</label>
<input name="entry.1648749368" required>

<label>Cognome</label>
<input name="entry.868688176" required>

<label>Email</label>
<input type="email" name="entry.1859203311" required>

<label>Telefono</label>
<input name="entry.104973273" required>

<label>Numero partecipanti</label>
<select name="entry.1955189742" required>
<option value="">Seleziona</option>
<option value="1">1</option>
<option value="2">2</option>
<option value="3">3</option>
<option value="4">4</option>
<option value="5">5</option>
<option value="6">6</option>
</select>

<label>Nomi altri partecipanti</label>
<textarea name="entry.397060786"></textarea>

<label>Note</label>
<textarea name="entry.488871536"></textarea>

<button type="submit">Invia</button>

<div id="ok" class="success">
Registrazione inviata correttamente ✔
</div>

</form>
</div>

<script>
document.getElementById("form").addEventListener("submit", function() {
  setTimeout(function(){
    document.getElementById("ok").style.display="block";
    document.getElementById("form").reset();
  }, 800);
});
</script>

</body>
</html>
