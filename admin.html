<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Area organizzatori</title>

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(135deg, #1c2f61, #c0188f);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      width: min(420px, 100%);
      background: #fff;
      border-radius: 24px;
      padding: 32px;
      box-shadow: 0 30px 80px rgba(0,0,0,0.25);
      text-align: center;
    }

    h1 {
      margin: 0 0 12px;
      color: #c0188f;
      font-size: 30px;
    }

    p {
      margin: 0 0 22px;
      color: #555;
      line-height: 1.5;
    }

    input {
      width: 100%;
      padding: 14px;
      border-radius: 14px;
      border: 1px solid #d8cde2;
      font-size: 16px;
    }

    button, a {
      display: block;
      width: 100%;
      margin-top: 14px;
      padding: 15px;
      border-radius: 14px;
      border: 0;
      text-decoration: none;
      font-weight: 700;
      font-size: 16px;
      cursor: pointer;
      text-align: center;
    }

    button, .primary {
      background: #c0188f;
      color: #fff;
    }

    .secondary {
      background: #1c2f61;
      color: #fff;
    }

    .light {
      background: #f3eef8;
      color: #1c2f61;
      border: 1px solid #e2d4ec;
    }

    .hidden {
      display: none;
    }

    .error {
      min-height: 22px;
      margin-top: 12px;
      color: #b42318;
      font-weight: 700;
      font-size: 14px;
    }
  </style>
</head>

<body>
  <div class="card" id="loginBox">
    <h1>Area organizzatori</h1>
    <p>Inserisci la password per accedere al file partecipanti.</p>

    <input type="password" id="passwordInput" placeholder="Password" />
    <button type="button" onclick="login()">Entra</button>

    <div class="error" id="errorMessage"></div>
  </div>

  <div class="card hidden" id="adminBox">
    <h1>Gestione partecipanti</h1>
    <p>Apri il foglio con le registrazioni ricevute.</p>

    <a class="primary" href="https://docs.google.com/spreadsheets/d/1BF3ikdinr2zrHHWkyY_Gk9tDFPi5ts7FjioexX-WFn4/edit?resourcekey=&gid=7218344#gid=7218344" target="_blank">
      Apri Excel partecipanti
    </a>

    <a class="light" href="index.html">
      Torna al sito
    </a>
  </div>

  <script>
    const PASSWORD = "Lepasswordsonolemigliori123!";

    function login() {
      const password = document.getElementById("passwordInput").value;
      const error = document.getElementById("errorMessage");

      if (password === PASSWORD) {
        document.getElementById("loginBox").classList.add("hidden");
        document.getElementById("adminBox").classList.remove("hidden");
        error.textContent = "";
      } else {
        error.textContent = "Password non corretta.";
      }
    }

    document.getElementById("passwordInput").addEventListener("keydown", function(event) {
      if (event.key === "Enter") {
        login();
      }
    });
  </script>
</body>
</html>
